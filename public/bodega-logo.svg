<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84CE25;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9be83a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0671ae;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e8fd0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Isotipo: Huella circular con gradiente -->
  <g>
    <!-- Círculo exterior azul degradado -->
    <circle cx="40" cy="40" r="28" fill="none" stroke="url(#grad2)" stroke-width="2.5"/>

    <!-- Líneas internas verdes degradadas (huella) -->
    <path d="M40 14c10 0 18 9 18 20s-8 20-18 20" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M40 22c6.5 0 11.5 5 11.5 12s-5 12-11.5 12" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M40 30c3.5 0 6 2.5 6 5.5s-2.5 5.5-6 5.5" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Punto de acento en verde neón -->
    <circle cx="40" cy="14" r="2.5" fill="#84CE25"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="48" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#0671ae">iencinas</text>

  <!-- Subtítulo pequeño -->
  <text x="80" y="62" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="1.5" fill="#84CE25" opacity="0.9">OFFICE MANAGER</text>
</svg>
